name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - demo/**
      - svgsNumber/**
      - phase2/**
      - graphicsNumber.txt
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go run ./phase2

      - run: mkdir -p demo/public && cp -r svgsNumber demo/public/svgsNumber

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - run: npm install
        working-directory: demo

      - run: npm run build
        working-directory: demo

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

      - id: deployment
        uses: actions/deploy-pages@v4
